# Deploy Sakura ไป EC2 — ไม่รันอัตโนมัติ รันเฉพาะเมื่อกด Run workflow จากแท็บ Actions
#
# ต้องตั้งค่า:
#   1. GitHub repo → Settings → Secrets and variables → Actions → New repository secret
#      ชื่อ: EC2_SSH_PRIVATE_KEY  ค่า: เนื้อหาในไฟล์ tectony-dev.pem ทั้งหมด (รวม -----BEGIN/END-----)
#   2. EC2 Security Group: ต้องอนุญาต Inbound SSH (TCP port 22) จากที่ GitHub Actions รันได้
#      ถ้า "Connection reset by peer" = เปิด port 22 ให้ Source เป็น 0.0.0.0/0 หรือเพิ่ม IP ranges ของ GitHub (https://api.github.com/meta → actions)
#   3. บน EC2 ครั้งแรก: ติดตั้ง Node (v18+) และ pm2, สร้างไฟล์ .env ใน DEPLOY_PATH
#      ตัวอย่าง: curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash แล้ว nvm install 20 && npm i -g pm2
#
# ทางเลือก: ตั้ง EC2_HOST หรือ DEPLOY_PATH ใน repo Variables ถ้าไม่ใช้ค่าตั้งต้น

name: Deploy to EC2

on:
  workflow_dispatch: # รันเฉพาะเมื่อกด Run workflow จากแท็บ Actions (ไม่รันอัตโนมัติเมื่อ push)

env:
  EC2_HOST: ec2-18-143-144-31.ap-southeast-1.compute.amazonaws.com
  EC2_USER: ubuntu
  DEPLOY_PATH: /home/ubuntu/Sakura # โฟลเดอร์บนเซิร์ฟเวอร์ที่วางโค้ด

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy.pem
          chmod 600 ~/.ssh/deploy.pem
          ssh-keyscan -H ${{ env.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      # รีทราย 3 ครั้ง + ConnectTimeout/ConnectionAttempts — แก้กรณี Connection reset by peer (มักจาก Security Group ไม่อนุญาต port 22 จาก GitHub IP)
      - name: Create deploy directory on EC2
        run: |
          SSH_OPTS="-i ~/.ssh/deploy.pem -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ConnectionAttempts=3"
          for i in 1 2 3; do
            if ssh $SSH_OPTS ${{ env.EC2_USER }}@${{ env.EC2_HOST }} "mkdir -p ${{ env.DEPLOY_PATH }}"; then
              echo "SSH connection succeeded (attempt $i)"
              exit 0
            fi
            echo "SSH attempt $i failed, retrying in 15s..."
            sleep 15
          done
          echo "SSH failed after 3 attempts. ตรวจสอบ EC2 Security Group อนุญาต Inbound port 22 จาก 0.0.0.0/0 หรือ GitHub Actions IP"
          exit 1

      # Sync เฉพาะไฟล์จาก repo ไป EC2 (เพิ่ม/อัปเดต) — ไม่ใช้ --delete จึงไม่ลบไฟล์หรือโฟลเดอร์ที่สร้างบนเซิร์ฟเวอร์ (.env, credentials, ไฟล์เชื่อมต่อ ฯลฯ)
      - name: Sync files to EC2
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy.pem -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ConnectionAttempts=3" \
            --exclude 'node_modules' \
            --exclude '.next' \
            --exclude '.git' \
            --exclude '.env' \
            --exclude 'secrets' \
            --exclude '*.log' \
            --exclude 'public/uploads' \
            . ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:${{ env.DEPLOY_PATH }}/


      # ใช้ ServerAliveInterval/ServerAliveCountMax ป้องกัน SSH Broken pipe ตอน build นาน (next build ใช้เวลาหลายนาที)
      - name: Install, build and restart on EC2
        timeout-minutes: 25
        run: |
          ssh -i ~/.ssh/deploy.pem -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ConnectionAttempts=3 -o ServerAliveInterval=60 -o ServerAliveCountMax=10 ${{ env.EC2_USER }}@${{ env.EC2_HOST }} \
            "source ~/.nvm/nvm.sh 2>/dev/null || true; cd ${{ env.DEPLOY_PATH }} && npm ci && npm run build && (pm2 restart sakura-app --update-env 2>/dev/null || pm2 start server.js --name sakura-app)"
