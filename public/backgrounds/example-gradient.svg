<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#831843;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#500724;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Main Background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  
  <!-- Sakura Petals Scattered -->
  <g opacity="0.1">
    <ellipse cx="200" cy="150" rx="8" ry="12" fill="#ec4899" transform="rotate(-30 200 150)"/>
    <ellipse cx="400" cy="300" rx="10" ry="15" fill="#f472b6" transform="rotate(20 400 300)"/>
    <ellipse cx="800" cy="200" rx="7" ry="11" fill="#ec4899" transform="rotate(-45 800 200)"/>
    <ellipse cx="1200" cy="400" rx="9" ry="14" fill="#f9a8d4" transform="rotate(15 1200 400)"/>
    <ellipse cx="1600" cy="250" rx="8" ry="13" fill="#ec4899" transform="rotate(-20 1600 250)"/>
    <ellipse cx="300" cy="700" rx="10" ry="14" fill="#f472b6" transform="rotate(35 300 700)"/>
    <ellipse cx="700" cy="850" rx="7" ry="12" fill="#ec4899" transform="rotate(-40 700 850)"/>
    <ellipse cx="1100" cy="750" rx="9" ry="13" fill="#f9a8d4" transform="rotate(25 1100 750)"/>
    <ellipse cx="1500" cy="900" rx="8" ry="11" fill="#ec4899" transform="rotate(-15 1500 900)"/>
  </g>
  
  <!-- Subtle Grid Pattern -->
  <g opacity="0.03" stroke="#ec4899" stroke-width="1">
    <line x1="0" y1="270" x2="1920" y2="270"/>
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="0" y1="810" x2="1920" y2="810"/>
    <line x1="480" y1="0" x2="480" y2="1080"/>
    <line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1440" y1="0" x2="1440" y2="1080"/>
  </g>
  
  <!-- Glow Effects -->
  <circle cx="960" cy="540" r="400" fill="#ec4899" opacity="0.02"/>
  <circle cx="960" cy="540" r="300" fill="#f472b6" opacity="0.03"/>
  <circle cx="960" cy="540" r="200" fill="#f9a8d4" opacity="0.04"/>
</svg>
